services:
  ui:
    image: ghcr.io/mathisverstrepen/meridian/frontend:${IMAGE_TAG:-latest}
    container_name: ${NAME}_ui
    ports:
      - "${NITRO_PORT}:${NITRO_PORT}"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENV=${ENV}
      - NITRO_PORT=${NITRO_PORT}
      - NUXT_PUBLIC_API_BASE_URL=${NUXT_PUBLIC_API_BASE_URL}
      - NUXT_API_INTERNAL_BASE_URL=${NUXT_API_INTERNAL_BASE_URL}
      - NUXT_PUBLIC_IS_OAUTH_DISABLED=${NUXT_PUBLIC_IS_OAUTH_DISABLED}
      - NUXT_SESSION_PASSWORD=${NUXT_SESSION_PASSWORD}
      - NUXT_OAUTH_GITHUB_CLIENT_ID=${NUXT_OAUTH_GITHUB_CLIENT_ID}
      - NUXT_OAUTH_GITHUB_CLIENT_SECRET=${NUXT_OAUTH_GITHUB_CLIENT_SECRET}
      - NUXT_OAUTH_GOOGLE_CLIENT_ID=${NUXT_OAUTH_GOOGLE_CLIENT_ID}
      - NUXT_OAUTH_GOOGLE_CLIENT_SECRET=${NUXT_OAUTH_GOOGLE_CLIENT_SECRET}
      - NUXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN}

  api:
    image: ghcr.io/mathisverstrepen/meridian/backend:${IMAGE_TAG:-latest}
    container_name: ${NAME}_api
    command: sh -c "chown -R appuser:appuser /app/data && su appuser -c 'alembic upgrade head && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:${API_PORT}'"
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - user_files:/app/data/user_files
      - cloned_repos:/app/data/cloned_repos
      - ./proxies.txt:/app/proxies.txt
    environment:
      - ENV=${ENV}
      - USERPASS=${USERPASS}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - ALLOW_CORS_ORIGINS=${ALLOW_CORS_ORIGINS}
      - API_PORT=${API_PORT}
      - MASTER_OPEN_ROUTER_API_KEY=${MASTER_OPEN_ROUTER_API_KEY}
      - DATABASE_ECHO=${DATABASE_ECHO}
      - BACKEND_SECRET=${BACKEND_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_HOST=${NEO4J_HOST}
      - NEO4J_BOLT_PORT=${NEO4J_BOLT_PORT}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - NUXT_OAUTH_GITHUB_CLIENT_ID=${NUXT_OAUTH_GITHUB_CLIENT_ID}
      - NUXT_OAUTH_GITHUB_CLIENT_SECRET=${NUXT_OAUTH_GITHUB_CLIENT_SECRET}
      - NUXT_OAUTH_GOOGLE_CLIENT_ID=${NUXT_OAUTH_GOOGLE_CLIENT_ID}
      - SENTRY_DSN=${SENTRY_DSN}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW}
      - SEARXNG_URL=${SEARXNG_URL}
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY}
      - GOOGLE_CSE_ID=${GOOGLE_CSE_ID}
      - SANDBOX_MANAGER_URL=${SANDBOX_MANAGER_URL}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_AUTH_PROTOCOL=${SMTP_AUTH_PROTOCOL}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}

  sandbox_manager:
    image: ghcr.io/mathisverstrepen/meridian/sandbox-manager:${IMAGE_TAG:-latest}
    container_name: ${NAME}_sandbox_manager
    expose:
      - "${SANDBOX_MANAGER_PORT}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SANDBOX_MANAGER_PORT=${SANDBOX_MANAGER_PORT}
      - MAX_CONCURRENT_SANDBOXES=${MAX_CONCURRENT_SANDBOXES}
      - SANDBOX_QUEUE_WAIT_SECONDS=${SANDBOX_QUEUE_WAIT_SECONDS}
      - EXECUTION_TIMEOUT_SECONDS=${EXECUTION_TIMEOUT_SECONDS}
      - SANDBOX_OUTPUT_LIMIT_BYTES=${SANDBOX_OUTPUT_LIMIT_BYTES}
      - SANDBOX_CODE_MAX_BYTES=${SANDBOX_CODE_MAX_BYTES}
      - SANDBOX_MEMORY_LIMIT=${SANDBOX_MEMORY_LIMIT}
      - SANDBOX_CPU_NANO_CPUS=${SANDBOX_CPU_NANO_CPUS}
      - SANDBOX_PIDS_LIMIT=${SANDBOX_PIDS_LIMIT}
      - SANDBOX_TMPFS_SIZE=${SANDBOX_TMPFS_SIZE}
      - SANDBOX_RUNTIME=${SANDBOX_RUNTIME}
      - SANDBOX_ARTIFACT_MAX_FILES=${SANDBOX_ARTIFACT_MAX_FILES}
      - SANDBOX_ARTIFACT_MAX_FILE_BYTES=${SANDBOX_ARTIFACT_MAX_FILE_BYTES}
      - SANDBOX_ARTIFACT_MAX_TOTAL_BYTES=${SANDBOX_ARTIFACT_MAX_TOTAL_BYTES}
      - SANDBOX_INPUT_MAX_FILES=${SANDBOX_INPUT_MAX_FILES}
      - SANDBOX_INPUT_MAX_FILE_BYTES=${SANDBOX_INPUT_MAX_FILE_BYTES}
      - SANDBOX_INPUT_MAX_TOTAL_BYTES=${SANDBOX_INPUT_MAX_TOTAL_BYTES}
      - SANDBOX_WORKER_IMAGE=${SANDBOX_WORKER_IMAGE}

  db:
    image: postgres:17
    container_name: ${NAME}_pg_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../api/app/database/pg/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -h ${POSTGRES_HOST} -p ${POSTGRES_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - -p
      - ${POSTGRES_PORT}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE}
      - -c
      - work_mem=${POSTGRES_WORK_MEM}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM}
      - -c
      - random_page_cost=${POSTGRES_RANDOM_PAGE_COST}
      - -c
      - max_worker_processes=${POSTGRES_MAX_WORKER_PROCESSES}
      - -c
      - max_parallel_workers_per_gather=${POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER}
      - -c
      - max_parallel_workers=${POSTGRES_MAX_PARALLEL_WORKERS}
      - -c
      - log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_STATEMENT}
      - -c
      - log_lock_waits=${POSTGRES_LOG_LOCK_WAITS}
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}

  neo4j:
    image: neo4j:5
    container_name: ${NAME}_neo4j
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    ports:
      - "${NEO4J_HTTP_PORT}:${NEO4J_HTTP_PORT}"
      - "${NEO4J_BOLT_PORT}:${NEO4J_BOLT_PORT}"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_server_http_listen__address=${NEO4J_HTTP_ADDRESS}
      - NEO4J_server_bolt_listen__address=${NEO4J_BOLT_ADDRESS}
    healthcheck:
      test: ["CMD", "cypher-shell", "-a", "neo4j://localhost:${NEO4J_BOLT_PORT}", "-u", "${NEO4J_USER}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${NAME}_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  user_files:
  cloned_repos:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data: {}
  sentry_data: {}
