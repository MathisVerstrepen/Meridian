[tool.black]
line-length = 100
exclude = '''
/(
    \.git
    | \.mypy_cache
    | \.pytest_cache
    | venv
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = ["venv"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["venv"]
